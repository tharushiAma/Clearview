# ClearView/configs/config.yaml

paths:
  raw_file: "ClearView/data/raw/reviews.csv"
  processed_file: "ClearView/data/processed/clean_data.parquet"
  splits_dir: "ClearView/data/splits"

text:
  raw_col: "data"

aspects:
  - "stayingpower"
  - "texture"
  - "smell"
  - "price"
  - "colour"
  - "shipping"
  - "packing"

labels:
  - "positive"
  - "negative"
  - "neutral"

split:
  test_size: 0.2
  val_size: 0.1
  seed: 42
