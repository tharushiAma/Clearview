# Configuration for Multi-Aspect Sentiment Analysis with Explainability

# Model Configuration
model:
  name: "multi_aspect_sentiment_roberta_gcn"
  roberta_model: "roberta-base"
  hidden_dim: 768
  num_aspects: 7
  num_classes: 3 # negative, neutral, positive
  gcn_layers: 2
  dropout: 0.1
  use_dependency_gcn: true
  use_aspect_attention: true

# Aspect Configuration
aspects:
  names:
    [
      "stayingpower",
      "texture",
      "smell",
      "price",
      "colour",
      "shipping",
      "packing",
    ]
  label_map:
    negative: 0
    neutral: 1
    positive: 2

  # Class distribution (from augmented training data with preprocessed synthetic)
  # Updated: 2026-02-11 - After synthetic data integration (87.8% retention)
  class_counts:
    stayingpower: [727, 244, 1076] # neg, neu, pos
    texture: [639, 420, 2563]
    smell: [335, 274, 1668]
    price: [201, 218, 2295]
    colour: [499, 428, 4483]
    shipping: [1216, 267, 2406]
    packing: [236, 177, 2068]

# Training Configuration
training:
  batch_size: 16
  num_epochs: 30
  learning_rate: 2.0e-5
  warmup_steps: 500
  max_grad_norm: 1.0
  weight_decay: 0.01

  # Early stopping
  early_stopping_patience: 5
  early_stopping_metric: "macro_f1"

  # Loss function weights
  loss_weights:
    focal: 1.0
    cb: 0.5

  # Aspect-specific loss parameters
  focal_gamma:
    default: 2.0
    price: 3.0 # Severe imbalance
    packing: 3.0 # Severe imbalance
    smell: 2.5

  class_balanced_beta:
    default: 0.999
    price: 0.9999 # Extreme imbalance
    packing: 0.9999

# Data Configuration
data:
  train_path: "data/splits/train_augmented.csv" # Preprocessed + synthetic augmented data
  val_path: "data/splits/val.csv"
  test_path: "data/splits/test.csv"
  max_seq_length: 256
  text_column: "data"

  # Data augmentation
  # augmentation:
  #   enabled: true
  #   techniques: ["back_translation", "synonym_replacement", "mixup"]
  #   augment_minority_only: true
  #   augmentation_ratio:
  #     negative: 3.0 # Generate 3x samples for negative class
  #     neutral: 2.0
  #     positive: 1.0
  #   mixup_alpha: 0.4

  # Dependency parsing
  use_dependency_parsing: true
  dependency_parser: "spacy" # or "stanza"
  language: "en"

# Explainability Configuration
explainability:
  methods: ["attention", "lime", "integrated_gradients"]
  lime_num_features: 10
  lime_num_samples: 1000
  save_explanations: true
  visualize_attention: true
  visualize_dependency_paths: true

# Experiment Configuration
experiment:
  name: "cosmetic_sentiment_v1"
  save_dir: "results"
  log_every: 50
  eval_every: 500
  save_best_only: true
  use_wandb: false
  wandb_project: "cosmetic-sentiment-analysis"
  seed: 42

# Evaluation Configuration
evaluation:
  metrics: ["accuracy", "macro_f1", "weighted_f1", "mcc", "per_class_f1"]
  generate_confusion_matrix: true
  generate_classification_report: true
  save_predictions: true
  error_analysis: true

# Hardware Configuration
hardware:
  device: "cuda" # or "cpu"
  num_workers: 0
  pin_memory: true
  mixed_precision: true # Use automatic mixed precision for faster training
